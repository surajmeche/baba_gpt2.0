<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Baba GPT</title>
    <!-- Same CSS as main app -->
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="bot-icon-large">
                    <i class="fas fa-robot"></i>
                </div>
                <h2>Create Your Account</h2>
                <p>Join Baba GPT and start chatting</p>
            </div>
            
            <form id="signup-form">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe">
                </div>
                
                <div class="input-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                    <small style="color: var(--text-secondary); font-size: 12px; margin-top: 4px; display: block;">
                        Minimum 6 characters
                    </small>
                </div>
                
                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" required minlength="6">
                </div>
                
                <button type="submit" id="signup-btn" class="primary-btn">
                    <span id="btn-text">Create Account</span>
                    <i id="btn-spinner" class="fas fa-circle-notch fa-spin" style="display: none;"></i>
                </button>
            </form>
            
            <div class="login-footer">
                <p>Already have an account? <a href="login.html" style="color: var(--accent-color); text-decoration: none;">Sign In</a></p>
            </div>
        </div>
    </div>

    <!-- Signup Logic -->
    <script src="signup.js"></script>
</body>
</html>
