<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Baba GPT</title>
    <!-- Same CSS as main app -->
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="bot-icon-large">
                    <i class="fas fa-robot"></i>
                </div>
                <h2>Welcome to Baba GPT</h2>
                <p>Sign in to continue chatting</p>
            </div>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" id="login-btn" class="primary-btn">
                    <span id="btn-text">Sign In</span>
                    <i id="btn-spinner" class="fas fa-circle-notch fa-spin" style="display: none;"></i>
                </button>
            </form>
            
            <div class="login-footer">
                <p>Don't have an account? <a href="signup.html" style="color: var(--accent-color); text-decoration: none;">Sign Up</a></p>
            </div>
        </div>
    </div>

    <!-- Login Logic -->
    <script src="login.js"></script>
</body>
</html>
